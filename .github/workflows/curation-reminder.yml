name: Curation Reminder (Abend → Aaron)

# Erinnert Aaron am Vorabend, falls er die Story für morgen noch nicht
# freigegeben hat. No-op, wenn schon freigegeben. Der Auto-Fallback (beste
# kuratierte ≥7.0) greift unabhängig — dies ist nur der Stups zum aktiven
# Übersteuern. Läuft VOR dem 04:20-UTC-Versand (Cloudflare Worker).
on:
  schedule:
    - cron: '0 19 * * *'  # 19:00 UTC (21:00 CEST) — Abend, lange vor dem Versand
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger curation reminder
        run: |
          curl -fsS -X POST "${BASE_URL}/api/cron/curation-reminder" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -w "\nHTTP %{http_code}\n"
        env:
          BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
