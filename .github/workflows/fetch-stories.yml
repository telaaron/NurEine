name: Fetch & Score Stories

# ABGESCHALTET (Aaron 2026-07-10): Der Story-Fetch läuft jetzt als lokale
# Claude-Routine (nureine-fetch, 01:15 nachts) — die Analyse nutzt Claude Code
# (bezahltes Kontingent) statt eines extra API-Keys. Der GitHub-Cron ist deaktiviert.
# Als Notfall-Fallback bleibt er MANUELL auslösbar (workflow_dispatch) — nutzt dann
# DeepSeek/Claude-API, falls die Secrets gesetzt sind.
on:
  # schedule:
  #   - cron: '0 6,10,14,18 * * *'  # 06/10/14/18 UTC — deaktiviert, s.o.
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # +5 Min. für Audio-TTS (ElevenLabs + Fallback)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests python-dotenv trafilatura Pillow

      - name: Fetch and score stories
        run: python scripts/fetch_stories.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
