name: Generate OG Images (DEPRECATED)

# DEPRECATED 2026-06: OG images are now rendered on-demand via the Satori
# endpoint /api/og/[slug] (cream + amber, branded). This Python generator wrote
# og_image_url into the DB, which then overrode the new endpoint. Schedule
# disabled so it can't repopulate og_image_url. Kept as manual dispatch only,
# for the rare case of pre-warming/pre-generating. Do NOT re-enable the cron.

on:
  workflow_dispatch:
    inputs:
      all:
        description: 'Re-generate all OG images'
        type: boolean
        default: false

jobs:
  generate-og:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (fonts + Pillow deps)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-inter fonts-dejavu fonts-liberation2 libjpeg-dev zlib1g-dev libwebp-dev

      - name: Install Python dependencies
        run: pip install requests python-dotenv Pillow

      - name: Generate OG images for new stories
        run: python scripts/generate_og_images.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Regenerate all OG images (if --all selected)
        if: ${{ github.event.inputs.all == 'true' }}
        run: python scripts/generate_og_images.py --all
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
