name: Daily Newsletter

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 07:00 CET daily
  workflow_dispatch:

jobs:
  send-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Send daily newsletter
        run: python scripts/send_newsletter.py daily
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
          BREVO_FROM_NAME: ${{ secrets.BREVO_FROM_NAME }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL || 'https://nureine.de' }}
