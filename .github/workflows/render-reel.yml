name: Social — Reel rendern (Remotion)

# FALLBACK-Renderer. Das Reel des Tages produziert normalerweise die lokale
# Claude-Regie-Routine ("nureine-reel-regie", morgens auf Aarons Mac) mit
# eigener Dramaturgie (--script Regie-Modus). Dieser Workflow springt nur ein,
# wenn bis 16:00 UTC KEIN Reel existiert (Mac aus/Routine nicht gelaufen) —
# der Select-Endpoint liefert dann sonst story:null.
# Wochenplan (2026-07-07): 3 Reels/Woche Mo/Mi/Fr — das ist der Sweet Spot
# (Buffer/Mosseri: 3–5 Reels/Woche; >1/Tag kannibalisiert die Reichweite).
# Di/Do/Sa Carousel bzw. Stories · So Digest.
on:
  # PAUSIERT (2026-07-06, Aaron): Reels gehen bis zur Qualitäts-Abnahme NUR
  # manuell raus — erst rendern, Aaron ansehen lassen, dann posten.
  # Zum Reaktivieren den schedule-Block wieder einkommentieren:
  # schedule:
  #   - cron: '0 16 * * 1,3,5'  # Mo/Mi/Fr 16:00 UTC — nur Fallback
  workflow_dispatch:
    inputs:
      vo:
        description: 'Voiceover (1 = an, 0 = aus)'
        default: '0'

jobs:
  reel:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: edge-tts installieren (Voiceover)
        run: pip install edge-tts

      - name: Reel-Story wählen
        id: pick
        run: |
          RESP=$(curl -fsS -X POST "${BASE_URL}/api/cron/social-reel-select" \
            -H "Authorization: Bearer ${CRON_SECRET}")
          echo "response: $RESP"
          SLUG=$(echo "$RESP" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const d=JSON.parse(s);console.log((d.story||{}).slug||'')})")
          SID=$(echo "$RESP" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const d=JSON.parse(s);console.log((d.story||{}).id||'')})")
          CAT=$(echo "$RESP" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const d=JSON.parse(s);console.log((d.story||{}).category||'gemeinschaft')})")
          CAP=$(echo "$RESP" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const d=JSON.parse(s);console.log((d.story||{}).caption||'')})")
          TAGS=$(echo "$RESP" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const d=JSON.parse(s);console.log(((d.story||{}).hashtags||[]).join(','))})")
          {
            echo "slug=$SLUG"; echo "sid=$SID"; echo "cat=$CAT"; echo "tags=$TAGS"
            echo "cap<<EOF"; echo "$CAP"; echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Remotion-Deps installieren
        if: steps.pick.outputs.slug != ''
        run: npm ci
        working-directory: remotion

      - name: Reel rendern + hochladen + einreihen
        if: steps.pick.outputs.slug != ''
        run: |
          node render.mjs \
            --base-url "${BASE_URL}" \
            --slug "${{ steps.pick.outputs.slug }}" \
            --out /tmp/reel.mp4 \
            --queue --story-id "${{ steps.pick.outputs.sid }}" \
            --category "${{ steps.pick.outputs.cat }}" \
            --hashtags "${{ steps.pick.outputs.tags }}" \
            --caption "${{ steps.pick.outputs.cap }}"
        working-directory: remotion
        env:
          BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # VO default AUS, bis die Stimm-Qualität einmal abgenommen ist.
          # Scharf schalten: Repo-Variable REEL_VO=1 setzen (Settings → Variables).
          VO: ${{ github.event.inputs.vo || vars.REEL_VO || '0' }}

      - name: Sofort posten (Publish-Cron läuft sonst erst morgen früh)
        if: steps.pick.outputs.slug != ''
        run: |
          curl -fsS -X POST "${BASE_URL}/api/cron/social-publish" \
            -H "Authorization: Bearer ${CRON_SECRET}" || true
        env:
          BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Nichts zu tun
        if: steps.pick.outputs.slug == ''
        run: echo "Kein Fallback nötig (Regie-Reel existiert) oder keine Story."
