name: Social — IG Story (verteilt)

# Postet IG-Stories über den Tag verteilt — pro Lauf EINE, sodass eine natürliche
# Story-Kette entsteht (max 15/Tag, Guard im Code). Stündlich 07-21 UTC.
on:
  schedule:
    - cron: '0 7-21 * * *'  # jede volle Stunde 07:00–21:00 UTC (09–23 CEST)
  workflow_dispatch:

jobs:
  story:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger IG story
        run: |
          curl -fsS -X POST "${BASE_URL}/api/cron/social-story" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -w "\nHTTP %{http_code}\n"
        env:
          BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
