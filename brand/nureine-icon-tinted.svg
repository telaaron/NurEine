<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- warm paper ground -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#000000"/><stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <!-- sun disc: layered amber -->
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6e6e6"/><stop offset="1" stop-color="#bdbdbd"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0f0f0"/><stop offset="1" stop-color="#e6e6e6"/>
    </radialGradient>
    <!-- paper-cut layer shadows (the 3D tell) -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#cfcfcf"/><stop offset="1" stop-color="#b8b8b8"/></linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a8a8a8"/><stop offset="1" stop-color="#9a9a9a"/></linearGradient>
    <linearGradient id="hill3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8a8a8a"/><stop offset="1" stop-color="#7a7a7a"/></linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- SUN: rays (layer 1, behind disc) -->
  <g transform="translate(512,440)" filter="url(#soft)">
    <g fill="url(#sun)">
      <!-- 12 paper rays as rounded petals -->
      <g id="rays"></g>
    </g>
  </g>

  <!-- rays drawn explicitly (rounded triangles around the disc) -->
  <g transform="translate(512,440)" filter="url(#soft)">
    <path d="M 198,-28 Q 304,0 290,0 Q 304,0 198,28 A 200,200 0 0 1 198,-28 Z" fill="url(#sun)"/>
    <path d="M 185,75 Q 264,152 251,145 Q 264,152 158,123 A 200,200 0 0 1 185,75 Z" fill="url(#sun)"/>
    <path d="M 123,158 Q 152,264 145,251 Q 152,264 75,185 A 200,200 0 0 1 123,158 Z" fill="url(#sun)"/>
    <path d="M 28,198 Q 0,304 0,290 Q 0,304 -28,198 A 200,200 0 0 1 28,198 Z" fill="url(#sun)"/>
    <path d="M -75,185 Q -152,264 -145,251 Q -152,264 -123,158 A 200,200 0 0 1 -75,185 Z" fill="url(#sun)"/>
    <path d="M -158,123 Q -264,152 -251,145 Q -264,152 -185,75 A 200,200 0 0 1 -158,123 Z" fill="url(#sun)"/>
    <path d="M -198,28 Q -304,0 -290,0 Q -304,0 -198,-28 A 200,200 0 0 1 -198,28 Z" fill="url(#sun)"/>
    <path d="M -185,-75 Q -264,-152 -251,-145 Q -264,-152 -158,-123 A 200,200 0 0 1 -185,-75 Z" fill="url(#sun)"/>
    <path d="M -123,-158 Q -152,-264 -145,-251 Q -152,-264 -75,-185 A 200,200 0 0 1 -123,-158 Z" fill="url(#sun)"/>
    <path d="M -28,-198 Q -0,-304 -0,-290 Q -0,-304 28,-198 A 200,200 0 0 1 -28,-198 Z" fill="url(#sun)"/>
    <path d="M 75,-185 Q 152,-264 145,-251 Q 152,-264 123,-158 A 200,200 0 0 1 75,-185 Z" fill="url(#sun)"/>
    <path d="M 158,-123 Q 264,-152 251,-145 Q 264,-152 185,-75 A 200,200 0 0 1 158,-123 Z" fill="url(#sun)"/>
  </g>

  <!-- SUN disc (layer 2) -->
  <circle cx="512" cy="440" r="205" fill="url(#sunGlow)" filter="url(#soft)"/>
  <!-- inner ring shadow for paper depth -->
  <circle cx="512" cy="440" r="205" fill="none" stroke="#b8b8b8" stroke-width="3" opacity="0.5"/>
  <!-- top sheen on disc -->
  <ellipse cx="470" cy="380" rx="120" ry="80" fill="#ffffff" opacity="0.22"/>

  <!-- layered hills (foreground paper-cut, overlapping the sun's lower edge) -->
  <path d="M -20,720 C 250,640 400,710 560,690 C 720,670 900,720 1044,680 L 1044,1044 L -20,1044 Z" fill="url(#hill1)" filter="url(#soft)"/>
  <path d="M -20,820 C 200,760 420,820 600,800 C 780,780 920,830 1044,800 L 1044,1044 L -20,1044 Z" fill="url(#hill2)" filter="url(#soft)"/>
  <path d="M -20,920 C 240,880 460,930 640,915 C 820,900 960,940 1044,920 L 1044,1044 L -20,1044 Z" fill="url(#hill3)" filter="url(#soft)"/>
</svg>
