<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-canvas: #f5f1ea;
            --color-ink: #1a1815;
            --color-muted: #6b6359;
            --color-amber: #c87340;
            --color-amber-soft: #e9b58e;
        }

        body {
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .og-card {
            width: 1200px;
            height: 630px;
            background-color: var(--color-canvas);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sun-blur {
            position: absolute;
            right: -100px;
            top: -150px;
            width: 900px;
            height: 900px;
            background: radial-gradient(circle at center, rgba(200, 115, 64, 0.35) 0%, rgba(200, 115, 64, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            mix-blend-mode: multiply;
        }
        
        .sun-core {
            position: absolute;
            right: 120px;
            top: 70px;
            width: 360px;
            height: 360px;
            background-color: var(--color-amber);
            border-radius: 50%;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 85px 100px;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
        }

        .logo-svg {
            height: 70px;
            width: 70px;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-size: 96px;
            font-weight: 500;
            line-height: 1.05;
            color: var(--color-ink);
            margin: auto 0 0 0;
            letter-spacing: -3px;
            max-width: 950px;
        }

        .highlight {
            font-style: italic;
            font-weight: 400;
            color: var(--color-amber);
            position: relative;
        }

        .rule {
            width: 100px;
            height: 5px;
            background-color: var(--color-ink);
            margin: 40px 0;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 38px;
            font-weight: 500;
            color: var(--color-ink);
            letter-spacing: -0.5px;
        }
        
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 40px;
            font-size: 32px;
            font-weight: 600;
            color: var(--color-muted);
            letter-spacing: 0.5px;
        }

        .arch {
            position: absolute;
            bottom: 0;
            right: 15%;
            width: 440px;
            height: 500px;
            border: 2px solid rgba(26, 24, 21, 0.1);
            border-bottom: none;
            border-radius: 220px 220px 0 0;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="og-card">
        <div class="sun-blur"></div>
        <div class="sun-core"></div>
        <div class="arch"></div>
        
        <div class="content">
            <div class="header">
                <!-- Embedded SVG of the logo scaled appropriately -->
                <div class="logo-svg">
                    <svg version="1.0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048" preserveAspectRatio="xMidYMid meet">

                     </g>
                     <g fill="#1a1815">

                      <path d="M1166 1168.40 c-9 -18 -40.40 -77.80 -94.40 -180.40 -47.20 -89.40 -53.20 -102 -49.60 -104.40 2.60 -1.80 3 -29.40 2.40 -231.80 -0.40 -172.20 -1 -229.60 -2.80 -228.60 -1.40 0.80 -1.60 0.60 -0.80 -0.80 3.40 -5.60 7.60 -0.80 20.40 23.20 25.80 49 147.40 272 361.80 664.40 19 34.60 36 66 37.80 69.60 l3.40 6.40 -134.60 0 -134.60 0 -9 -17.60z"/>
                     </g>
                     <g fill="#c87340">
                      <path d="M864 1185.40 c0 -0.40 5.80 -11.40 12.60 -24.60 7 -13 24 -45.40 37.80 -71.80 13.80 -26.40 42.20 -80.40 63 -120 20.80 -39.60 39 -75 40.40 -78.40 2.80 -7 8.80 -8.80 11 -3.40 0.60 1.80 1.20 69.60 1.20 151 l0 147.80 -83 0 c-45.60 0 -83 -0.20 -83 -0.60z"/>
                     </g>

                      <path d="M1024 1038 c0 -81.40 -0.80 -148 -1.60 -148 -0.80 0 -2.80 1.20 -4.20 2.60 -1.60 1.40 -1.40 0 0.60 -4.20 1.80 -3.40 4.20 -6.40 5.20 -6.40 1 0 7.40 10.60 13.80 23.60 6.60 13 24.60 48 40.20 77.60 52.40 99 67.40 127.60 85 161.80 9.60 18.80 18.40 34.80 19.20 36 1 1 1.80 2.60 1.80 3.40 0 0.80 -36 1.60 -80 1.60 l-80 0 0 -148z"/>
                     </g>
                     </g>
                    </svg>
                </div>
            </div>

            <!-- Big Claim -->
            <h1>Gute Nachrichten.<br>Jeden Tag <span class="highlight">exakt eine.</span></h1>
            
            <div class="rule"></div>
            
            <div class="bottom-bar">
                <span class="tagline">Gegen die Reizüberflutung. Für mehr Lichtblicke.</span>
                <span>nureine.de</span>
            </div>
        </div>
    </div>
</body>
</html>
