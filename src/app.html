<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="robots" content="max-image-preview:large" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Inter:wght@300..800&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>
		<!-- Google Reader Revenue Manager (SwG) — Publisher-Center-Integration. -->
		<script async type="application/javascript" src="https://news.google.com/swg/js/v1/swg-basic.js"></script>
		<script>
			(self.SWG_BASIC = self.SWG_BASIC || []).push((basicSubscriptions) => {
				basicSubscriptions.init({
					type: 'NewsArticle',
					isPartOfType: ['Product'],
					isPartOfProductId: 'CAow69zLDA:openaccess',
					clientOptions: { theme: 'light', lang: 'de' }
				});
			});
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-[var(--color-canvas)]">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
