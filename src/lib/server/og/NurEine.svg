<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#f6f1e7"/><stop offset="1" stop-color="#efe7d8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.46" r="0.42">
      <stop offset="0" stop-color="#fff3da" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#ffe6b8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffe6b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lantern" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde8c4"/><stop offset="1" stop-color="#f7d49a"/>
    </linearGradient>
  </defs>

  <!-- ground -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- soft light halo radiating from the lantern -->
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- ============ TOWER (two-tone paper-cut) ============ -->
  <!-- lit (left) half of the tapered tower -->
  <path d="M512 720 L512 1024 L335 1024 L398 720 Z" fill="#7a563c"/>
  <!-- shadow (right) half -->
  <path d="M512 720 L626 720 L689 1024 L512 1024 Z" fill="#6a4a32"/>
  <!-- door -->
  <path d="M512 838 q34 0 34 34 l0 96 -68 0 0 -96 q0 -34 34 -34 Z" fill="#41281280" opacity="0.9"/>
  <path d="M512 838 q30 0 30 30 l0 100 -60 0 0 -100 q0 -30 30 -30 Z" fill="#3c2410"/>

  <!-- ============ GALLERY / BALCONY base ============ -->
  <path d="M330 712 q-6 -18 14 -18 L680 694 q20 0 14 18 l-14 116 q-4 14 -20 14 L350 842 q-16 0 -20 -14 Z" fill="#4a3220"/>
  <!-- rail cut-outs (the cream shows through) -->
  <g fill="#f3ecdf">
    <rect x="360" y="726" width="46" height="58" rx="6"/>
    <rect x="430" y="726" width="46" height="58" rx="6"/>
    <rect x="548" y="726" width="46" height="58" rx="6"/>
    <rect x="618" y="726" width="46" height="58" rx="6"/>
  </g>

  <!-- ============ LANTERN ROOM ============ -->
  <!-- glowing glass behind the mullions -->
  <rect x="386" y="486" width="252" height="216" rx="14" fill="url(#lantern)"/>
  <!-- dark mullion frame: posts + cross -->
  <g fill="#3a2614">
    <rect x="386" y="486" width="34" height="216" rx="8"/>
    <rect x="604" y="486" width="34" height="216" rx="8"/>
    <rect x="468" y="486" width="30" height="216"/>
    <rect x="526" y="486" width="30" height="216"/>
  </g>

  <!-- ============ ROOF (dark hip roof, flared eaves) ============ -->
  <path d="M512 322 L700 498 q10 12 -8 12 L332 510 q-18 0 -8 -12 Z" fill="#4a3220"/>
  <!-- roof shadow (right slope) -->
  <path d="M512 322 L700 498 q10 12 -8 12 L512 510 Z" fill="#3a2716"/>
  <!-- finial -->
  <rect x="499" y="268" width="26" height="62" rx="12" fill="#4a3220"/>
</svg>
