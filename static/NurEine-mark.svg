<svg width="640" height="740" viewBox="280 250 480 690" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lantern" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbe2b4"/><stop offset="1" stop-color="#f3c987"/>
    </linearGradient>
  </defs>

  <!-- TOWER (two-tone, tapered) -->
  <path d="M512 720 L512 928 L392 928 L400 720 Z" fill="#7a563c"/>
  <path d="M512 720 L624 720 L632 928 L512 928 Z" fill="#6a4a32"/>
  <!-- door -->
  <path d="M512 832 q30 0 30 30 l0 66 -60 0 0 -66 q0 -30 30 -30 Z" fill="#3c2410"/>

  <!-- LANTERN glass -->
  <rect x="396" y="486" width="232" height="208" rx="12" fill="url(#lantern)"/>
  <g fill="#3a2614">
    <rect x="396" y="486" width="32" height="208" rx="7"/>
    <rect x="596" y="486" width="32" height="208" rx="7"/>
    <rect x="474" y="486" width="28" height="208"/>
    <rect x="522" y="486" width="28" height="208"/>
  </g>

  <!-- BALCONY: solid top deck + bottom rim + 5 rail posts (gaps are transparent) -->
  <g fill="#4a3220">
    <!-- top deck under the lantern -->
    <path d="M344 686 q-12 0 -12 12 l0 26 360 0 0 -26 q0 -12 -12 -12 Z"/>
    <!-- bottom rim of the gallery -->
    <rect x="338" y="800" width="348" height="26" rx="8"/>
    <!-- left & right end posts + 4 inner posts -->
    <rect x="338" y="724" width="30" height="78"/>
    <rect x="430" y="724" width="26" height="78"/>
    <rect x="498" y="724" width="28" height="78"/>
    <rect x="568" y="724" width="26" height="78"/>
    <rect x="656" y="724" width="30" height="78"/>
  </g>

  <!-- ROOF (flared hip) -->
  <path d="M512 322 L700 498 q10 12 -8 12 L332 510 q-18 0 -8 -12 Z" fill="#4a3220"/>
  <path d="M512 322 L700 498 q10 12 -8 12 L512 510 Z" fill="#3a2716"/>
  <rect x="499" y="268" width="26" height="62" rx="12" fill="#4a3220"/>
</svg>
